    <script>
        // Click-to-load thumbnails + one-at-a-time playback
        function resetVideo(wrap) {
            const id = wrap.dataset.videoId;
            wrap.innerHTML = `
                <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg" class="video-thumb" alt="">
                <div class="play-btn"><i class="bi bi-play-fill"></i></div>`;
        }

        document.addEventListener('click', (e) => {
            const wrap = e.target.closest('.video-wrap');
            if (!wrap) return;
            if (wrap.querySelector('iframe')) return; // already playing

            // Stop any other playing video
            document.querySelectorAll('.video-wrap iframe').forEach(iframe => {
                resetVideo(iframe.closest('.video-wrap'));
            });

            // Load the clicked video
            const id = wrap.dataset.videoId;
            wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?rel=0" allowfullscreen allow="encrypted-media"></iframe>`;
        });
    </script>
